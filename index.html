<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINECRAFT CORE SYSTEM</title>
    <style>
        /* Kosmiczne tło z ruchomymi gwiazdami */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #020208 url('https://transparenttextures.com') repeat;
            animation: moveStars 100s linear infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* Górny lewy róg strony */
        .top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Główny kontener */
        .container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Świecący nagłówek główny */
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px #38b6ff, 0 0 20px #38b6ff, 0 0 40px #38b6ff;
        }

        /* Podtytuł */
        .subtitle {
            font-size: 0.9rem;
            color: #a5a6bc;
            letter-spacing: 1px;
            margin-bottom: 50px;
        }

        /* Układ kafelków / przycisków */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            justify-content: center;
            margin-bottom: 60px;
            padding: 0 20px;
        }

        /* Wygląd pojedynczego przycisku */
        .card-btn {
            background: linear-gradient(135deg, #0d122b 0%, #111a42 100%);
            border: 1px solid #1f2d6d;
            border-radius: 12px;
            padding: 45px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #92b2ff;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(13, 18, 43, 0.5);
        }

        /* Efekt po najechaniu myszką (świecenie) */
        .card-btn:hover {
            transform: translateY(-5px);
            border-color: #38b6ff;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(56, 182, 255, 0.4), inset 0 0 15px rgba(56, 182, 255, 0.2);
            text-shadow: 0 0 8px #38b6ff;
        }

        /* Stopka na samym dole */
        .footer {
            font-size: 0.8rem;
            color: #56586b;
            letter-spacing: 1px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Twój nick w lewym górnym rogu -->
    <div class="top-left">Wiktor19009</div>

    <div class="container">
        <!-- Główny napis -->
        <h1>MINECRAFT CORE SYSTEM</h1>
        <div class="subtitle">Kliknij system, aby zobaczyć szczegóły.</div>

        <!-- Przyciski (Możesz zmienić ich nazwy poniżej) -->
        <div class="grid">
            <button class="card-btn">Sklepy</button>
            <button class="card-btn">Osiągnięcia</button>
            <button class="card-btn">Strefa AFK</button>
            <button class="card-btn">Skrzynki</button>
            <button class="card-btn">Rynek</button>
        </div>

        <!-- Stopka z Twoim kontaktem na dole -->
        <div class="footer">
            &copy; 2026 Wiktor19009 - Discord: Wiktor19009
        </div>
    </div>

</body>
</html>
