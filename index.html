<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINECRAFT CORE SYSTEM</title>
    <style>
        /* Ciemne tło z powoli latającymi gwiazdami */
        body {
            margin: 0;
            padding: 0;
            background-color: #030616;
            background-image: url('https://transparenttextures.com');
            /* Animacja przesuwania tła o nazwie 'latajaceGwiazdy' trwająca 120 sekund w nieskończoność */
            animation: latajaceGwiazdy 120s linear infinite;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Reguły poruszania się tła */
        @keyframes latajaceGwiazdy {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 1000px -1000px;
            }
        }

        /* Lewy górny róg */
        .top-left {
            position: absolute;
            top: 25px;
            left: 40px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Kontener główny nagłówka */
        .header-container {
            text-align: center;
            margin-top: 40px;
        }

        /* Wielki, świecący napis główny */
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px #3273ff, 0 0 20px #3273ff, 0 0 30px #3273ff;
        }

        /* Mały podtytuł szarym tekstem */
        .subtitle {
            font-size: 11px;
            color: #7b819b;
            letter-spacing: 1px;
        }

        /* Siatka przycisków - dokładnie 3 kolumny */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 270px);
            gap: 25px 35px;
            justify-content: center;
            margin: auto 0;
        }

        /* Wygląd kafelków 1:1 */
        .card-btn {
            background: linear-gradient(180deg, #101935 0%, #0b1024 100%);
            border: 1px solid #1c2b5a;
            color: #ffffff;
            padding: 45px 10px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(26, 43, 98, 0.4);
        }

        /* Efekt świecenia całego przycisku po najechaniu */
        .card-btn:hover {
            border-color: #3877ff;
            box-shadow: 0 0 25px rgba(56, 119, 255, 0.6);
            text-shadow: 0 0 5px #ffffff;
        }

        /* Stopka na samym dole */
        .footer {
            font-size: 11px;
            color: #434963;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Dopasowanie do telefonów (żeby przyciski nie wychodziły poza ekran) */
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                width: 100%;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Nazwa w lewym górnym rogu -->
    <div class="top-left">'Wiktor1909.</div>

    <div class="header-container">
        <h1>MINECRAFT CORE SYSTEM</h1>
        <div class="subtitle">Kliknij system aby zobaczyć demo.</div>
    </div>

    <!-- Układ przycisków -->
    <div class="grid">
        <button class="card-btn">Sklepy</button>
        <button class="card-btn">Osiągnięcia</button>
        <button class="card-btn">Strefa AFK</button>
        <button class="card-btn">Skrzynki</button>
        <button class="card-btn">Rynek</button>
    </div>

    <!-- Stopka z Twoim Discordem -->
    <div class="footer">
        &copy; 2026 Dc/Discord - Wiktor19009
    </div>

</body>
</html>
