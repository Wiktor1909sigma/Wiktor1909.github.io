<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona</title>
    <style>
        /* Styl strony - ciemny motyw */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1f22;
            color: #f2f3f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: #2b2d31;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 20px;
        }

        /* Sekcja Kontakt Discord */
        .discord-contact {
            background-color: #5865F2; /* Kolor Discorda */
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 30px;
            box-shadow: 0 2px 10px rgba(88, 101, 242, 0.4);
        }

        /* Sekcja z przyciskami */
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: #4e5058;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-weight: 500;
        }

        /* Efekt po najechaniu myszką na przycisk */
        .btn:hover {
            background-color: #949ba4;
            color: #111214;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Moja Strona</h1>
        
        <!-- Sekcja Kontakt -->
        <div class="discord-contact">
            💬 Kontakt Discord: Wiktor19009
        </div>

        <!-- Sekcja Przyciski -->
        <div class="button-grid">
            <button class="btn">Przycisk 1</button>
            <button class="btn">Przycisk 2</button>
            <button class="btn">Przycisk 3</button>
            <button class="btn">Przycisk 4</button>
        </div>
    </div>

</body>
</html>
